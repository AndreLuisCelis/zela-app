<div class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-300">
  <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl animate-in zoom-in-95 duration-300 flex flex-col items-center text-center">
    
    <!-- Icon Container -->
    <div [class]="'w-24 h-24 rounded-[2.5rem] flex items-center justify-center text-4xl shadow-xl mb-8 transform hover:scale-105 transition-transform duration-300 ' + colorClass">
      <div class="italic font-black">{{ icon }}</div>
    </div>

    <!-- Content -->
    <h2 class="text-2xl font-black text-slate-800 uppercase italic tracking-tight mb-2">
      {{ title() }}
    </h2>
    
    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest leading-relaxed mb-10 max-w-[220px]">
      {{ message() }}
    </p>

    <!-- Actions -->
    <div class="w-full flex flex-col gap-3">
      @if (actionButtonText()) {
      <button
        (click)="action.emit()"
        [class]="'w-full py-4 bg-white border-2 font-black rounded-2xl uppercase tracking-widest active:scale-95 transition-all text-sm ' + (type() === 'error' ? 'border-red-100 text-red-600 hover:bg-red-50' : 'border-blue-100 text-blue-600 hover:bg-blue-50')">
        {{ actionButtonText() }}
      </button>
      }
      <button
        (click)="close.emit()"
        [class]="'w-full py-4 text-white font-black rounded-2xl uppercase tracking-widest shadow-xl active:scale-95 transition-all text-sm ' + buttonClass">
        {{ buttonText() }}
      </button>
    </div>
  </div>
</div>
